services:
  qdrant:
    image: qdrant/qdrant:v1.7.4
    container_name: codesearch-qdrant
    restart: unless-stopped
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    container_name: codesearch-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: packages/api/Dockerfile
    container_name: codesearch-api
    restart: unless-stopped
    ports:
      - "3001:3001"
    depends_on:
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    env_file: .env
    volumes:
      - .:/app
    environment:
      - NODE_ENV=development

volumes:
  qdrant_data:
    driver: local
  redis_data:
    driver: local
